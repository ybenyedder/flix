# Flix — self-hosted deployment.
#
#   1. Point the /media volume at your video library (read-only is enough).
#   2. docker compose up -d
#   3. Open http://<host>:4247 — the first boot prints a temporary admin
#      password in the logs (`docker compose logs flix`) unless you set
#      FLIX_ADMIN_PASSWORD below.
#
# Téléchargements automatiques (opt-in) : pour déployer aussi Sonarr/Radarr/
# Prowlarr/Bazarr + qBittorrent et les câbler automatiquement, superposez le
# fichier docker-compose.arr.yml (voir docs/downloads-arr.md) :
#   docker compose -f docker-compose.yml -f docker-compose.arr.yml up -d

services:
  flix:
    # Pinned to the released version (bumped by each release commit): a bare
    # :latest can silently jump versions on any `docker compose pull` —
    # upgrades should be a deliberate tag change here.
    image: ghcr.io/ybenyedder/flix:0.11.0
    build: .
    container_name: flix
    restart: unless-stopped
    ports:
      - "4247:4247"
    volumes:
      - flix-data:/data
      # Change the left side to your library path:
      - ./videos:/media:ro
    environment:
      # Belt-and-braces: start.mjs now defaults to the wildcard on its own
      # (a non-IP HOSTNAME — Docker injects the container id — is ignored),
      # but keeping the bind explicit documents intent and survives an
      # operator exporting a stray FLIX_HOST elsewhere.
      FLIX_HOST: "0.0.0.0"
      # FLIX_ADMIN_PASSWORD: "change-me"   # skip the generated first-boot password
      # FLIX_MAX_TRANSCODES: "2"           # concurrent ffmpeg sessions cap
      # FLIX_MAX_TRANSCODE_HEIGHT: "1080"  # software-transcode resolution guard
      # FLIX_TRICKPLAY: "1"                # scrubbing preview sprites (extra CPU per file)
      FLIX_LOG_FORMAT: pretty

volumes:
  flix-data:
