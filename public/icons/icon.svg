<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Flix">
  <!-- Flix app icon — source of truth for every generated PNG (see scripts/gen-icons.mjs).
       Full-bleed dark background + a bold red block "F" monogram. The mark sits
       well inside the ~80% maskable safe zone (centered, no strokes touching the
       edges) so the same artwork works unmasked (favicon/apple-touch-icon) and
       masked into a circle/squircle (Android adaptive/maskable icon). -->
  <rect width="512" height="512" fill="#141414" />
  <g fill="#E50914">
    <rect x="176" y="96" width="190" height="70" rx="10" />
    <rect x="176" y="96" width="70" height="320" rx="10" />
    <rect x="176" y="226" width="150" height="70" rx="10" />
  </g>
</svg>
