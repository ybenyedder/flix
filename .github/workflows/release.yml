name: Build and Release

on:
  push:
    tags:
      - 'v*' # e.g. v0.1.0
  workflow_dispatch:

jobs:
  desktop:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write # lets electron-builder publish to the Releases page

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Node 22 like every other job (Dockerfile, server-bundle, egg yolk) —
      # the desktop server runs under ELECTRON_RUN_AS_NODE with an
      # Electron-rebuilt better-sqlite3, so 20 vs 22 had no ABI impact here,
      # but "all in sync" is the rule the comments below rely on.
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: 'npm'

      # These installers are privileged, signed, published artifacts, so they
      # MUST be built from the pinned lockfile — never an unpinned `npm install`
      # (supply-chain integrity). We used to `rm` the lockfile to work around a
      # Linux-generated lock omitting the win32 native optionals (lightningcss,
      # @next/swc, @tailwindcss/oxide…), which broke Windows with "Cannot find
      # module lightningcss.win32-x64-msvc.node". That's no longer needed: npm's
      # cross-platform lockfile records every platform's optional binaries and
      # `npm ci` installs the ones matching this runner. Keep the lockfile;
      # --include=optional just makes the intent explicit.
      - name: Install dependencies
        run: npm ci --include=optional

      - name: Build web app
        run: npm run build

      - name: Prepare desktop bundle
        run: npm run desktop:prepare

      # Publish only from a v* tag: a workflow_dispatch run from a branch used
      # to `--publish always` too, creating a stray draft release off-tag.
      - name: Build and publish Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The server-bundle job pre-creates a PUBLISHED release; electron-
          # publish refuses to touch a published release older than 2 hours
          # (its anti-clobber heuristic) and silently SKIPS the upload with a
          # green job — a desktop leg re-run the next day would ship a release
          # with no installers. This opt-out disables that time check.
          EP_GH_IGNORE_TIME: "1"
        run: npx electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}

  # Build the standalone server bundle (the thing Docker/Pterodactyl deploys)
  # and attach it to the same release. Node 22 here is deliberate: the bundled
  # better-sqlite3 binding is ABI-locked to the build Node, and both the
  # Dockerfile runtime and the Pterodactyl egg's yolk run Node 22 — keep all
  # three in sync.
  # Independent of the desktop job: a desktop-build failure must never block
  # publishing the server bundle that the Docker/Pterodactyl deploys pull.
  # The "Ensure the release exists" step below is what makes that independence
  # real — nothing else guarantees the release exists when this job uploads.
  server-bundle:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      - name: Build web app
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Package standalone bundle
        run: node scripts/prepare-standalone.mjs --tar flix-standalone-linux-x64.tar.gz
      # Create the release if nothing has yet: without this, a bare `gh release
      # upload` races the (much slower) desktop job — electron-builder is what
      # creates the release otherwise — and fails with "release not found"
      # whenever this job wins, which is exactly the "desktop must never block
      # the server bundle" failure this job exists to avoid. electron-builder
      # attaches to an existing tag release, so creating it up front is safe.
      - name: Ensure the release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes
      - name: Attach bundle to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" flix-standalone-linux-x64.tar.gz --clobber

  # Build and push the container image to GHCR (ghcr.io/<owner>/flix).
  # Independent of the release assets — the compose file and generic Docker
  # users pull this directly.
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build the Android + Android TV APKs and attach them to the same release.
  # Depends on server-bundle, NOT desktop: server-bundle guarantees the
  # release exists (its "Ensure the release exists" step), and a flaky
  # desktop matrix leg must not block publishing the signed APKs — the same
  # independence the server bundle itself got. (gh release upload only ADDS
  # assets; it never touches release notes.)
  android:
    runs-on: ubuntu-latest
    needs: server-bundle
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    defaults:
      run:
        working-directory: android-native
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2
      # The signing keystore is deliberately NOT in the repo (see .gitignore):
      # CI receives it as a base64 repo secret and materialises it for both
      # modules (app and tv share the same key). Fail fast with a clear error
      # if the secrets are missing — gradle's own "storePassword is empty"
      # failure is much harder to diagnose.
      - name: Restore signing keystore
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_B64" ]; then
            echo "::error::Secret ANDROID_KEYSTORE_B64 manquant — impossible de signer les APKs (gh secret set ANDROID_KEYSTORE_B64 < <(base64 -w0 flix.keystore))."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > app/flix.keystore
          cp app/flix.keystore tv/flix.keystore
      - name: Build release APKs
        env:
          FLIX_VERSION: ${{ github.ref_name }}
          ANDROID_KEYSTORE_PWD: ${{ secrets.ANDROID_KEYSTORE_PWD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PWD: ${{ secrets.ANDROID_KEY_PWD }}
        run: ./gradlew :app:assembleRelease :tv:assembleRelease
      - name: Attach APKs to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp app/build/outputs/apk/release/app-release.apk "../Flix-${GITHUB_REF_NAME}-mobile.apk"
          cp tv/build/outputs/apk/release/tv-release.apk "../Flix-${GITHUB_REF_NAME}-tv.apk"
          cd ..
          gh release upload "${GITHUB_REF_NAME}" "Flix-${GITHUB_REF_NAME}-mobile.apk" "Flix-${GITHUB_REF_NAME}-tv.apk" --clobber
