name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Rapid successive pushes used to stack redundant full runs; a hung test
# (zombie ffmpeg) used to burn the 6h default job timeout.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Node 22 to match everything deployment-facing (Dockerfile, release
      # server bundle, Pterodactyl egg yolk) — better-sqlite3's binding is
      # ABI-locked to the build Node.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      # The playback/image test suites spawn a REAL ffmpeg/ffprobe (to generate
      # a tiny H.264/AAC clip and exercise actual probing/remux/transcode) —
      # ubuntu-latest's preinstalled ffmpeg build isn't guaranteed to have the
      # codecs this needs, so install a known-good one explicitly rather than
      # relying on the runner image's default.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # better-sqlite3 compiles a native binding during install.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  # The Dockerfile used to be built for the FIRST time at release-tag time —
  # a change breaking it (file newly excluded by .dockerignore, native dep,
  # prepare-standalone prune) passed green CI and only exploded on `v*`.
  # Build (no push) + boot + /api/health smoke on every push/PR instead.
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Build image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: false
          load: true
          tags: flix:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test /api/health
        run: |
          docker run -d --name flix-ci -e PORT=4247 -p 4247:4247 flix:ci
          ok=""
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4247/api/health >/dev/null 2>&1; then ok=1; break; fi
            sleep 2
          done
          docker logs flix-ci || true
          docker rm -f flix-ci || true
          [ "$ok" = "1" ]

  # NOTE: release artifacts (desktop installers + the Android/Android TV
  # APKs) are built and attached to the GitHub Release by release.yml, which
  # triggers on `v*` tags. This workflow only runs on branch/PR pushes.
