<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src data:; script-src 'unsafe-inline'" />
    <title>Configurer Flix</title>
    <style>
      :root {
        --bg: #141414;
        --surface: #181818;
        --surface-2: #232323;
        --border: #333333;
        --text: #ffffff;
        --muted: #b3b3b3;
        --accent: #e50914;
        --accent-hover: #f6121d;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-user-select: none;
        user-select: none;
        display: flex;
        flex-direction: column;
      }
      main {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 32px 40px 40px;
        display: flex;
        flex-direction: column;
        gap: 22px;
      }
      .brand { display: flex; align-items: center; gap: 12px; }
      .brand .logo {
        width: 42px; height: 42px; border-radius: 8px;
        background: var(--accent);
        display: flex; align-items: center; justify-content: center;
        font-weight: 800; font-size: 20px; color: #fff;
      }
      .brand h1 { font-size: 20px; font-weight: 650; letter-spacing: -0.01em; }
      .lead { color: var(--muted); font-size: 14px; line-height: 1.5; }
      .lead strong { color: var(--text); font-weight: 600; }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .card-head { display: flex; flex-direction: column; gap: 4px; }
      .card-head .t { font-size: 15px; font-weight: 600; }
      .card-head .d { font-size: 13px; color: var(--muted); line-height: 1.45; }
      .row { display: flex; gap: 10px; align-items: center; }
      input {
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 10px;
        border-radius: 6px;
        flex: 1;
        font-size: 14px;
      }
      button.btn {
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--text);
        border-radius: 6px;
        padding: 11px 16px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
      }
      button.btn:hover { background: #2c2c2c; }
      button.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
      button.btn.primary:hover { background: var(--accent-hover); }
      button.btn.secondary { background: transparent; }
      button.btn:disabled { opacity: 0.5; cursor: default; }
      .actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 4px; }
      .error { color: #ff6b6b; font-size: 13px; min-height: 16px; }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <div class="logo">F</div>
        <h1>Bienvenue dans Flix</h1>
      </div>
      <p class="lead">
        Entre <strong>l'URL de ton serveur Flix</strong> pour t'y connecter à distance, ou laisse le champ vide pour utiliser le <strong>serveur local intégré</strong> (bibliothèque sur cet ordinateur).
      </p>

      <section class="card">
        <div class="card-head">
          <div class="t">Serveur Distant</div>
          <div class="d">Ex: https://flix.webtvmedia.net — vide = serveur local</div>
        </div>
        <div class="row">
          <input type="text" id="serverUrl" placeholder="https://..." value="https://flix.webtvmedia.net" />
        </div>
      </section>

      <div class="error" id="error"></div>

      <div class="actions">
        <button class="btn secondary" id="cancel">Quitter</button>
        <button class="btn primary" id="continue">Se connecter</button>
      </div>
    </main>

    <script>
      const api = window.flixDesktop || {};
      const $ = (id) => document.getElementById(id);
      const urlEl = $("serverUrl");
      const errEl = $("error");
      let busy = false;

      const showError = (msg) => { errEl.textContent = msg || ""; };

      $("continue").addEventListener("click", async () => {
        if (busy) return;
        busy = true;
        showError("");
        try {
          const res = await api.submitSetup({ serverUrl: urlEl.value.trim() });
          if (!res || !res.ok) {
            showError((res && res.error) || "URL invalide.");
            busy = false;
          }
        } catch (e) {
          showError("Erreur : " + (e && e.message ? e.message : e));
          busy = false;
        }
      });

      $("cancel").addEventListener("click", () => api.cancelSetup && api.cancelSetup());
    </script>
  </body>
</html>
